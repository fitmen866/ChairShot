<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>椅背投石机</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="游戏状态">
        <div class="brand">
          <span class="brand-mark">椅</span>
          <div>
            <h1>椅背投石机</h1>
            <p>按住蓄力，松开发射泡面。</p>
          </div>
        </div>

        <div class="meters">
          <div class="meter-card">
            <span>蓄力</span>
            <div class="meter-track">
              <div id="powerBar" class="meter-fill"></div>
            </div>
          </div>
          <div class="meter-card">
            <span>角度</span>
            <strong id="angleReadout">0°</strong>
          </div>
          <div class="meter-card">
            <span>得分</span>
            <strong id="scoreReadout">0</strong>
          </div>
        </div>

        <button id="resetButton" class="icon-button" type="button" aria-label="重新开始" title="重新开始">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

      <section class="stage-wrap" aria-label="椅背投石机游戏区域">
        <canvas id="gameCanvas" width="1280" height="720"></canvas>
        <div id="messagePanel" class="message-panel">
          <strong>准备开始</strong>
          <span>按住画面或空格蓄力</span>
        </div>
        <div id="menuOverlay" class="menu-overlay" data-view="main">
          <section class="menu-panel menu-view is-active" data-panel="main" aria-label="主界面">
            <div class="menu-title">
              <span class="menu-kicker">自制整活小游戏</span>
              <h2>椅背投石机</h2>
              <p>先选模式，再把泡面优雅地送进显示器。</p>
            </div>
            <div class="menu-actions">
              <button id="startGameButton" class="menu-button primary" type="button">开始游戏</button>
              <button id="leaderboardButton" class="menu-button" type="button">排行榜</button>
              <button id="volumeButton" class="menu-button" type="button">音量设置</button>
            </div>
          </section>

          <section class="menu-panel menu-view" data-panel="leaderboard" aria-label="排行榜">
            <div class="menu-title compact">
              <span class="menu-kicker">本机记录</span>
              <h2>排行榜</h2>
            </div>
            <ol id="leaderboardList" class="leaderboard-list"></ol>
            <div class="menu-actions row">
              <button id="clearScoresButton" class="menu-button subtle" type="button">清空记录</button>
              <button class="menu-button primary" data-menu-back type="button">返回主界面</button>
            </div>
          </section>

          <section class="menu-panel menu-view" data-panel="volume" aria-label="音量设置">
            <div class="menu-title compact">
              <span class="menu-kicker">声音反馈</span>
              <h2>音量设置</h2>
            </div>
            <label class="volume-control" for="volumeSlider">
              <span>音量</span>
              <input id="volumeSlider" type="range" min="0" max="100" step="1" />
              <strong id="volumeValue">70%</strong>
            </label>
            <button id="muteButton" class="menu-button subtle" type="button">静音</button>
            <div class="menu-actions row">
              <button id="testSoundButton" class="menu-button" type="button">试听音效</button>
              <button class="menu-button primary" data-menu-back type="button">返回主界面</button>
            </div>
          </section>
        </div>
      </section>

      <section class="controls" aria-label="游戏操作">
        <button id="chargeButton" class="charge-button" type="button">
          <span>按住蓄力</span>
        </button>
        <div class="hint">电脑端可按空格。目标是让泡面砸中右侧显示器。</div>
      </section>
    </main>

    <script src="./src/game.js"></script>
  </body>
</html>
